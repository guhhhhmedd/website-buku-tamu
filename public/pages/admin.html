<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin — Buku Tamu Kominfo Stan</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy:  #0f2a4a;
    --navy2: #1a3a5c;
    --blue:  #1d6cb0;
    --sky:   #3b9de0;
    --bg:    #f0f4f9;
    --white: #ffffff;
    --text:  #0f172a;
    --muted: #64748b;
    --border:#cbd5e1;
    --green: #22c55e;
    --red:   #ef4444;
    --amber: #f59e0b;
    --radius:12px;
    --sidebar: 240px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
  }

  /* ══ LOGIN PAGE ══════════════════════════════════════════ */
  #login-page {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--navy) 0%, #1e4a7a 100%);
  }
  .login-card {
    background: white; border-radius: 16px;
    padding: 48px 40px; width: 100%; max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .login-logo {
    text-align: center; margin-bottom: 28px;
  }
  .login-logo .icon {
    width: 64px; height: 64px; border-radius: 16px;
    background: linear-gradient(135deg, var(--blue), var(--sky));
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 12px;
  }
  .login-logo h2 { font-size: 1.2rem; color: var(--navy); }
  .login-logo p  { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

  .login-field { margin-bottom: 18px; }
  .login-field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
  .login-field input {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
    border-radius: 8px; font-family: inherit; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .login-field input:focus { border-color: var(--sky); box-shadow: 0 0 0 3px rgba(59,157,224,0.15); }

  .btn-login {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--blue), var(--sky));
    color: white; border: none; border-radius: 8px;
    font-family: inherit; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-login:hover { opacity: 0.9; }
  .btn-login:disabled { opacity: 0.5; }

  .login-err {
    background: #fee2e2; border: 1px solid #fca5a5; color: #b91c1c;
    border-radius: 8px; padding: 10px 14px; font-size: 0.84rem;
    margin-bottom: 16px; display: none;
  }
  .login-err.show { display: block; }

  /* ══ DASHBOARD PAGE ══════════════════════════════════════ */
  #dashboard-page { display: none; }

  /* Topbar */
  .topbar {
    background: var(--navy);
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo { font-size: 22px; }
  .topbar-title { color: white; font-size: 0.95rem; font-weight: 700; }
  .topbar-title span { display: block; font-size: 0.72rem; font-weight: 400; color: rgba(255,255,255,0.5); }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .admin-badge {
    color: rgba(255,255,255,0.7); font-size: 0.8rem;
  }
  .btn-logout {
    padding: 7px 16px; border-radius: 6px;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    color: white; font-family: inherit; font-size: 0.8rem;
    cursor: pointer; transition: background 0.2s;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.2); }

  /* Content */
  .content { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  @media(max-width:700px) { .stats-grid { grid-template-columns: 1fr 1fr; } }

  .stat-card {
    background: white; border-radius: var(--radius);
    padding: 20px; box-shadow: 0 1px 8px rgba(15,42,74,0.07);
    display: flex; align-items: center; gap: 16px;
  }
  .stat-icon {
    width: 48px; height: 48px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 22px;
    flex-shrink: 0;
  }
  .stat-icon.total    { background: #eff6ff; }
  .stat-icon.tunggu   { background: #fefce8; }
  .stat-icon.acc      { background: #f0fdf4; }
  .stat-icon.tolak    { background: #fff1f2; }
  .stat-num  { font-size: 1.8rem; font-weight: 700; color: var(--navy); line-height: 1; }
  .stat-lbl  { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  /* Filters */
  .filter-bar {
    background: white; border-radius: var(--radius);
    padding: 16px 20px; margin-bottom: 16px;
    box-shadow: 0 1px 8px rgba(15,42,74,0.07);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .filter-bar span { font-size: 0.8rem; font-weight: 600; color: var(--navy); }
  .filter-btn {
    padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--border);
    background: white; font-family: inherit; font-size: 0.8rem; cursor: pointer;
    transition: all 0.15s; color: var(--text);
  }
  .filter-btn:hover { border-color: var(--sky); color: var(--blue); }
  .filter-btn.active { background: var(--blue); border-color: var(--blue); color: white; }

  /* Table */
  .table-card {
    background: white; border-radius: var(--radius);
    box-shadow: 0 1px 8px rgba(15,42,74,0.07); overflow: hidden;
  }
  .table-header {
    padding: 18px 24px; border-bottom: 1px solid #e8eef5;
    display: flex; align-items: center; justify-content: space-between;
  }
  .table-header h3 { font-size: 0.95rem; font-weight: 700; }
  .table-header span { font-size: 0.78rem; color: var(--muted); }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 12px 20px;
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.5px;
    color: var(--muted); text-transform: uppercase;
    background: #f8fafc; border-bottom: 1px solid #e8eef5;
  }
  td { padding: 16px 20px; border-bottom: 1px solid #f1f5f9; font-size: 0.87rem; vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
  }
  .badge.menunggu  { background: #fefce8; color: #854d0e; border: 1px solid #fde68a; }
  .badge.disetujui { background: #f0fdf4; color: #15803d; border: 1px solid #86efac; }
  .badge.ditolak   { background: #fff1f2; color: #b91c1c; border: 1px solid #fca5a5; }

  .btn-acc, .btn-tolak {
    padding: 6px 14px; border-radius: 6px; font-family: inherit;
    font-size: 0.78rem; font-weight: 600; cursor: pointer; border: none;
    transition: opacity 0.15s; margin-right: 6px;
  }
  .btn-acc  { background: #dcfce7; color: #15803d; }
  .btn-acc:hover  { background: #bbf7d0; }
  .btn-tolak { background: #fee2e2; color: #b91c1c; }
  .btn-tolak:hover { background: #fecaca; }

  .nama-col strong { display: block; margin-bottom: 2px; }
  .nama-col small  { color: var(--muted); font-size: 0.78rem; }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
  .loading-row td { text-align: center; padding: 40px; color: var(--muted); }

  /* ══ MODAL ═══════════════════════════════════════════════ */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 16px;
    width: 100%; max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden; animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }

  .modal-head {
    padding: 20px 24px; border-bottom: 1px solid #e8eef5;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-head h3 { font-size: 1rem; }
  .modal-close {
    background: none; border: none; font-size: 1.3rem;
    cursor: pointer; color: var(--muted); line-height: 1;
    padding: 2px 6px; border-radius: 4px;
  }
  .modal-close:hover { background: #f1f5f9; }
  .modal-body { padding: 24px; }

  .modal-body label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
  .modal-body textarea {
    width: 100%; padding: 10px 12px; border: 1.5px solid var(--border);
    border-radius: 8px; font-family: inherit; font-size: 0.88rem;
    min-height: 90px; resize: vertical; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .modal-body textarea:focus { border-color: var(--sky); box-shadow: 0 0 0 3px rgba(59,157,224,0.15); }

  .modal-detail {
    background: #f8fafc; border-radius: 8px;
    padding: 14px; margin-bottom: 18px; font-size: 0.85rem;
  }
  .modal-detail p { margin-bottom: 6px; }
  .modal-detail p:last-child { margin: 0; }
  .modal-detail strong { color: var(--navy); }

  .modal-foot { padding: 16px 24px; background: #f8fafc; display: flex; gap: 10px; justify-content: flex-end; }
  .btn-cancel {
    padding: 9px 20px; border-radius: 8px; border: 1px solid var(--border);
    background: white; font-family: inherit; font-size: 0.88rem; cursor: pointer;
  }
  .btn-confirm {
    padding: 9px 20px; border-radius: 8px; border: none;
    font-family: inherit; font-size: 0.88rem; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s; color: white;
  }
  .btn-confirm.green { background: #16a34a; }
  .btn-confirm.red   { background: #dc2626; }
  .btn-confirm:hover { opacity: 0.85; }
</style>
</head>
<body>

<!-- ══ LOGIN ═════════════════════════════════════════════ -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🔐</div>
      <h2>Kominfo Stan</h2>
      <p>Portal Admin — Buku Tamu</p>
    </div>
    <div id="login-err" class="login-err"></div>
    <div class="login-field">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Username admin" />
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">Masuk</button>
  </div>
</div>

<!-- ══ DASHBOARD ══════════════════════════════════════════ -->
<div id="dashboard-page">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">🏛️</div>
      <div class="topbar-title">
        Dashboard Admin
        <span>Kominfo Stan — Sistem Buku Tamu</span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="admin-badge">👤 <span id="admin-nama">Admin</span></span>
      <button class="btn-logout" onclick="doLogout()">Keluar</button>
    </div>
  </div>

  <div class="content">

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon total">📋</div>
        <div><div class="stat-num" id="s-total">—</div><div class="stat-lbl">Total Permohonan</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon tunggu">⏳</div>
        <div><div class="stat-num" id="s-tunggu">—</div><div class="stat-lbl">Menunggu</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon acc">✅</div>
        <div><div class="stat-num" id="s-acc">—</div><div class="stat-lbl">Disetujui</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon tolak">❌</div>
        <div><div class="stat-num" id="s-tolak">—</div><div class="stat-lbl">Ditolak</div></div>
      </div>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
      <span>Filter:</span>
      <button class="filter-btn active" onclick="setFilter('semua',this)">Semua</button>
      <button class="filter-btn" onclick="setFilter('menunggu',this)">⏳ Menunggu</button>
      <button class="filter-btn" onclick="setFilter('disetujui',this)">✅ Disetujui</button>
      <button class="filter-btn" onclick="setFilter('ditolak',this)">❌ Ditolak</button>
      <button class="filter-btn" style="margin-left:auto" onclick="loadData()">🔄 Refresh</button>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-header">
        <h3>Daftar Permohonan Kunjungan</h3>
        <span id="tbl-count">—</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Tamu</th>
              <th>Ingin Bertemu</th>
              <th>Keperluan</th>
              <th>Jadwal</th>
              <th>Status</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="tbl-body">
            <tr class="loading-row"><td colspan="7">⏳ Memuat data...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- ══ MODAL KONFIRMASI ═══════════════════════════════════ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title">Konfirmasi</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-detail" id="modal-detail"></div>
      <label id="catatan-label">Catatan untuk Tamu <span style="color:#94a3b8">(opsional)</span></label>
      <textarea id="modal-catatan" placeholder="Contoh: Silakan datang ke lantai 2..."></textarea>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-confirm" id="modal-confirm-btn" onclick="konfirmasi()">Konfirmasi</button>
    </div>
  </div>
</div>

<script>
  let currentFilter  = 'semua';
  let pendingId      = null;
  let pendingAction  = null;

  // ── Login ────────────────────────────────────────────────
  async function doLogin() {
    const btn  = document.getElementById('login-btn');
    const err  = document.getElementById('login-err');
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value;

    if (!user || !pass) { showErr('Username dan password wajib diisi.'); return; }

    btn.disabled = true; btn.textContent = 'Masuk...';
    err.classList.remove('show');

    try {
      const res  = await fetch('/api/admin/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();

      if (!res.ok) { showErr(data.error || 'Login gagal.'); }
      else {
        document.getElementById('admin-nama').textContent = data.nama;
        document.getElementById('login-page').style.display    = 'none';
        document.getElementById('dashboard-page').style.display = 'block';
        loadData(); loadStats();
      }
    } catch { showErr('Gagal menghubungi server.'); }
    finally { btn.disabled = false; btn.textContent = 'Masuk'; }
  }
  function showErr(msg) {
    const el = document.getElementById('login-err');
    el.textContent = '❌ ' + msg; el.classList.add('show');
  }

  // ── Logout ───────────────────────────────────────────────
  async function doLogout() {
    await fetch('/api/admin/logout', { method: 'POST' });
    location.reload();
  }

  // ── Check session on load ────────────────────────────────
  (async function() {
    try {
      const res = await fetch('/api/admin/me');
      if (res.ok) {
        const data = await res.json();
        document.getElementById('admin-nama').textContent = data.nama;
        document.getElementById('login-page').style.display    = 'none';
        document.getElementById('dashboard-page').style.display = 'block';
        loadData(); loadStats();
      }
    } catch {}
  })();

  // ── Stats ────────────────────────────────────────────────
  async function loadStats() {
    try {
      const res  = await fetch('/api/admin/stats');
      const { data } = await res.json();
      document.getElementById('s-total').textContent  = data.total;
      document.getElementById('s-tunggu').textContent = data.menunggu;
      document.getElementById('s-acc').textContent    = data.disetujui;
      document.getElementById('s-tolak').textContent  = data.ditolak;
    } catch {}
  }

  // ── Load table ───────────────────────────────────────────
  async function loadData() {
    const tbody = document.getElementById('tbl-body');
    tbody.innerHTML = '<tr class="loading-row"><td colspan="7">⏳ Memuat data...</td></tr>';

    try {
      const res  = await fetch('/api/admin/kunjungan?status=' + currentFilter);
      const { data } = await res.json();

      document.getElementById('tbl-count').textContent = data.length + ' permohonan';

      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="7">
          <div class="empty-state">
            <div class="icon">📭</div>
            <div>Belum ada permohonan untuk filter ini</div>
          </div></td></tr>`;
        return;
      }

      tbody.innerHTML = data.map(r => `
        <tr>
          <td style="color:var(--muted);font-size:0.78rem">#${r.id}</td>
          <td>
            <div class="nama-col">
              <strong>${esc(r.nama_tamu)}</strong>
              <small>${esc(r.email_tamu)}</small>
              <small>📞 ${esc(r.no_hp)}</small>
              ${r.instansi !== '-' ? `<small>🏢 ${esc(r.instansi)}</small>` : ''}
            </div>
          </td>
          <td>${esc(r.tujuan_temu)}</td>
          <td style="max-width:200px;white-space:normal">${esc(r.keperluan.length > 80 ? r.keperluan.substring(0,80)+'...' : r.keperluan)}</td>
          <td>
            <div style="font-size:0.82rem">📅 ${r.tgl_fmt}</div>
            <div style="font-size:0.82rem;color:var(--muted)">🕐 ${r.jam_kunjungan}</div>
            <div style="font-size:0.72rem;color:var(--muted);margin-top:4px">Dikirim: ${r.dibuat}</div>
          </td>
          <td>
            <span class="badge ${r.status}">${
              r.status === 'menunggu'  ? '⏳ Menunggu'  :
              r.status === 'disetujui' ? '✅ Disetujui' : '❌ Ditolak'
            }</span>
            ${r.catatan_admin ? `<div style="font-size:0.75rem;color:var(--muted);margin-top:4px;max-width:140px">${esc(r.catatan_admin)}</div>` : ''}
          </td>
          <td>
            ${r.status === 'menunggu' ? `
              <button class="btn-acc"   onclick="openModal(${r.id},'disetujui','${esc(r.nama_tamu)}','${esc(r.tujuan_temu)}','${r.tgl_fmt}','${r.jam_kunjungan}')">✅ Setujui</button>
              <button class="btn-tolak" onclick="openModal(${r.id},'ditolak','${esc(r.nama_tamu)}','${esc(r.tujuan_temu)}','${r.tgl_fmt}','${r.jam_kunjungan}')">❌ Tolak</button>
            ` : '<span style="font-size:0.78rem;color:var(--muted)">Sudah diproses</span>'}
          </td>
        </tr>`).join('');
    } catch { tbody.innerHTML = '<tr class="loading-row"><td colspan="7">❌ Gagal memuat data.</td></tr>'; }
  }

  // ── Filter ───────────────────────────────────────────────
  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    loadData();
  }

  // ── Modal ────────────────────────────────────────────────
  function openModal(id, action, nama, tujuan, tgl, jam) {
    pendingId     = id;
    pendingAction = action;

    const isAcc = action === 'disetujui';
    document.getElementById('modal-title').textContent = isAcc ? '✅ Setujui Permohonan' : '❌ Tolak Permohonan';
    document.getElementById('modal-detail').innerHTML = `
      <p><strong>Tamu:</strong> ${esc(nama)}</p>
      <p><strong>Tujuan bertemu:</strong> ${esc(tujuan)}</p>
      <p><strong>Jadwal:</strong> ${tgl}, pukul ${jam}</p>`;
    document.getElementById('catatan-label').innerHTML =
      isAcc ? 'Catatan untuk Tamu <span style="color:#94a3b8">(opsional)</span>'
            : 'Alasan Penolakan <span style="color:#94a3b8">(opsional)</span>';
    document.getElementById('modal-catatan').value = '';
    document.getElementById('modal-catatan').placeholder =
      isAcc ? 'Contoh: Silakan menuju lantai 2, hubungi resepsionis terlebih dahulu.'
            : 'Contoh: Pejabat yang dituju sedang tidak ada di tempat.';

    const confirmBtn = document.getElementById('modal-confirm-btn');
    confirmBtn.textContent  = isAcc ? 'Ya, Setujui' : 'Ya, Tolak';
    confirmBtn.className    = 'btn-confirm ' + (isAcc ? 'green' : 'red');
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    pendingId = pendingAction = null;
  }

  async function konfirmasi() {
    const catatan = document.getElementById('modal-catatan').value.trim();
    const btn = document.getElementById('modal-confirm-btn');
    btn.disabled = true; btn.textContent = 'Memproses...';

    try {
      const res = await fetch('/api/admin/kunjungan/' + pendingId, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: pendingAction, catatan_admin: catatan })
      });
      const data = await res.json();
      if (!res.ok) alert('❌ ' + data.error);
      else {
        closeModal();
        loadData(); loadStats();
      }
    } catch { alert('Gagal menghubungi server.'); }
    finally { btn.disabled = false; }
  }

  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }
</script>
</body>
</html>
